name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (Ruff)
        run: python -m ruff check .

      - name: Validar YAML de configuração
        run: |
          python -c "import yaml; yaml.safe_load(open('config/sources.yaml', encoding='utf-8'))"
          python -c "import yaml; yaml.safe_load(open('config/settings.yaml', encoding='utf-8'))"

      - name: Testes (sem BigQuery) + cobertura
        env:
          GOOGLE_CLOUD_PROJECT: ci-project
          BQ_DATASET_BRONZE: tc_alfabetizacao_bronze
          BQ_DATASET_SILVER: tc_alfabetizacao_silver
          BQ_DATASET_GOLD: tc_alfabetizacao_gold
          BQ_DATASET_AUDIT: tc_alfabetizacao_audit
        run: |
          python -m pytest -m "not integration" --cov=src --cov-report=term-missing

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar docker compose
        run: docker compose config --quiet
