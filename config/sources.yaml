# Catálogo de fontes do pipeline Batch — TODAS validadas no BigQuery.
#
# Fontes educacionais reais: dataset público `basedosdados`.
# Alfabetização: br_inep_avaliacao_alfabetizacao (INEP — Avaliação Nacional).
# Diretórios: br_bd_diretorios_brasil (municipio, uf).
# A extração usa arquivos SQL versionados em sql/extraction/<fonte>.sql com
# renomeações explícitas para a nomenclatura canônica (ver docs/data_dictionary.md).

sources:
  municipio:
    description: "Diretório oficial de municípios brasileiros (Base dos Dados)."
    table_id: "basedosdados.br_bd_diretorios_brasil.municipio"
    enabled: true
    ingestion_type: batch
    schema_version: "1.0"
    layer_targets: [bronze, silver]
    key_columns: [id_municipio]
    selected_columns: [id_municipio, nome, sigla_uf]
    partition_columns: [sigla_uf]
    expected_schema:
      id_municipio: {type: STRING, nullable: false}
      nome: {type: STRING, nullable: false}
      sigla_uf: {type: STRING, nullable: false}

  uf:
    description: "Diretório oficial de UFs (Base dos Dados). id_uf->codigo_uf, sigla->sigla_uf."
    table_id: "basedosdados.br_bd_diretorios_brasil.uf"
    enabled: true
    ingestion_type: batch
    schema_version: "1.0"
    layer_targets: [bronze, silver]
    key_columns: [sigla_uf]
    selected_columns: [codigo_uf, sigla_uf, nome, regiao]
    partition_columns: [regiao]
    expected_schema:
      codigo_uf: {type: STRING, nullable: false}
      sigla_uf: {type: STRING, nullable: false}
      nome: {type: STRING, nullable: false}
      regiao: {type: STRING, nullable: false}

  meta_brasil:
    description: "Meta nacional de alfabetização (INEP). valor_meta = meta 2026."
    table_id: "basedosdados.br_inep_avaliacao_alfabetizacao.meta_alfabetizacao_brasil"
    enabled: true
    ingestion_type: batch
    schema_version: "1.0"
    layer_targets: [bronze, silver]
    key_columns: [ano]
    selected_columns: [ano, valor_meta]
    partition_columns: [ano]
    expected_schema:
      ano: {type: INTEGER, nullable: false}
      valor_meta: {type: FLOAT, nullable: false}

  meta_uf:
    description: "Meta de alfabetização por UF (INEP). valor_meta = meta 2026."
    table_id: "basedosdados.br_inep_avaliacao_alfabetizacao.meta_alfabetizacao_uf"
    enabled: true
    ingestion_type: batch
    schema_version: "1.0"
    layer_targets: [bronze, silver]
    key_columns: [ano, sigla_uf]
    selected_columns: [ano, sigla_uf, valor_meta]
    partition_columns: [ano]
    expected_schema:
      ano: {type: INTEGER, nullable: false}
      sigla_uf: {type: STRING, nullable: false}
      valor_meta: {type: FLOAT, nullable: false}

  meta_municipio:
    description: "Meta de alfabetização por município (INEP). valor_meta = meta 2026."
    table_id: "basedosdados.br_inep_avaliacao_alfabetizacao.meta_alfabetizacao_municipio"
    enabled: true
    ingestion_type: batch
    schema_version: "1.0"
    layer_targets: [bronze, silver]
    key_columns: [ano, id_municipio]
    selected_columns: [ano, id_municipio, valor_meta]
    partition_columns: [ano]
    expected_schema:
      ano: {type: INTEGER, nullable: false}
      id_municipio: {type: STRING, nullable: false}
      valor_meta: {type: FLOAT, nullable: false}

  indicador_alfabetizacao:
    description: "Resultado de alfabetização por município/ano (INEP, 2o ano, rede Municipal)."
    table_id: "basedosdados.br_inep_avaliacao_alfabetizacao.municipio"
    enabled: true
    ingestion_type: batch
    schema_version: "1.0"
    layer_targets: [bronze, silver]
    key_columns: [ano, id_municipio]
    selected_columns: [ano, id_municipio, serie, rede, taxa_alfabetizacao]
    partition_columns: [ano]
    expected_schema:
      ano: {type: INTEGER, nullable: false}
      id_municipio: {type: STRING, nullable: false}
      serie: {type: STRING, nullable: true}
      rede: {type: STRING, nullable: true}
      taxa_alfabetizacao: {type: FLOAT, nullable: false}

  aluno:
    description: "Microdados de alunos (INEP) — amostra anonimizada; ver source_limitations.md."
    table_id: "basedosdados.br_inep_avaliacao_alfabetizacao.alunos"
    enabled: true
    ingestion_type: batch
    schema_version: "1.0"
    layer_targets: [bronze, silver]
    key_columns: [ano, id_aluno]
    selected_columns: [ano, id_municipio, id_aluno, rede, serie, alfabetizado]
    partition_columns: [ano]
    expected_schema:
      ano: {type: INTEGER, nullable: false}
      id_municipio: {type: STRING, nullable: true}
      id_aluno: {type: STRING, nullable: false}
      rede: {type: STRING, nullable: true}
      serie: {type: STRING, nullable: true}
      alfabetizado: {type: STRING, nullable: true}
